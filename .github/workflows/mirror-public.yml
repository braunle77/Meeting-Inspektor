name: Mirror to public repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to braunle77/Meeting-Inspektor
        run: |
          git remote add public https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/braunle77/Meeting-Inspektor.git
          git push public HEAD:main --force
